<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Machine | Fresh Start</title>
    <style>
        :root { --main-teal: #3eb1a5; --action-red: #c0392b; --action-orange: #e67e22; --bg-gray: #f4f7f6; --safe-green: #27ae60; }
        body { font-family: sans-serif; background-color: var(--bg-gray); margin: 0; padding: 10px; display: flex; justify-content: center; }
        
        /* LOGIN SHIELD */
        #gatekeeper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .login-box { width: 100%; max-width: 350px; text-align: center; }
        
        /* LOGO STYLING */
        .app-logo { max-width: 220px; height: auto; margin-bottom: 20px; }
        .header-logo { max-width: 120px; height: auto; margin-bottom: 5px; filter: brightness(0) invert(1); } /* Makes logo white for header */

        .login-input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; }
        .btn-login { width: 100%; padding: 15px; background: var(--main-teal); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* MAIN APP */
        .app-container { display: none; width: 100%; max-width: 450px; background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 2px solid var(--main-teal); overflow: hidden; }
        .header { background: var(--main-teal); color: white; padding: 15px; text-align: center; }
        .header p { margin: 4px 0 0; font-size: 0.65rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .content { padding: 12px; }
        .section-label { font-size: 0.7rem; font-weight: bold; color: var(--main-teal); text-transform: uppercase; margin: 10px 0 5px 0; display: block; }
        .field-box { margin-bottom: 12px; }
        .field-label { font-size: 0.75rem; font-weight: bold; color: #4a5568; margin-bottom: 4px; display: block; }
        .input-full { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        
        /* CONDITION SELECTORS */
        .input-group { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        select { flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 0.9rem; background: white; }
        .camera-btn { background: #f1f5f9; border: 1px solid #cbd5e0; border-radius: 8px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .photo-count { position: absolute; top: -5px; right: -5px; background: var(--main-teal); color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 10px; }

        .btn-run { width: 100%; padding: 18px; background: var(--main-teal); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .results-area { display: none; margin-top: 15px; }
        .office-view { display: none; background: #fffbeb; padding: 12px; border-radius: 10px; margin-top: 15px; border: 1px dashed #f59e0b; }
        .sync-btn { width: 100%; padding: 20px; background: var(--action-red); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div id="gatekeeper">
    <div class="login-box">
        <img src="logo.png" alt="Fresh Start Solutions" class="app-logo">
        <select id="user_identity" class="login-input">
            <option value="">Select Partner...</option>
            <option value="Rosie Searcy">Rosie Searcy</option>
            <option value="Admin">Admin</option>
        </select>
        <button class="btn-login" onclick="unlock()">ENTER PORTAL</button>
    </div>
</div>

<div id="main_app" class="app-container">
    <div class="header">
        <img src="logo.png" alt="FS" class="header-logo">
        <p>"You Move On Your Own Terms—And We Help You Get There"</p>
    </div>

    <div class="content">
        <div class="field-box">
            <label class="field-label">Property Address</label>
            <input type="text" id="address" class="input-full" placeholder="Street, City, State">
        </div>

        <span class="section-label">Property Condition</span>
        <div class="input-group">
            <select id="roof"><option value="0">Roof: Functional ($0)</option><option value="15000">Replacement ($15k)</option></select>
            <button class="camera-btn" onclick="document.getElementById('cam').click()">📸<span class="photo-count">0</span></button>
        </div>
        <input type="file" id="cam" accept="image/*" capture="camera" style="display:none">

        <span class="section-label">Financials</span>
        <div class="field-box"><label class="field-label">After Repair Value (ARV)</label><input type="text" id="arv" class="input-full" placeholder="$0.00" oninput="formatCurrency(this)"></div>
        <div class="field-box"><label class="field-label">Mortgage Payoff</label><input type="text" id="mortgage" class="input-full" placeholder="$0.00" oninput="formatCurrency(this)"></div>
        <div class="field-box"><label class="field-label">Total Arrears</label><input type="text" id="arrears" class="input-full" placeholder="$0.00" oninput="formatCurrency(this)"></div>
        
        <button class="btn-run" onclick="runAssessment()">Run Assessment</button>
        <button id="admin-toggle" style="width:100%; margin-top:10px; font-size:0.6rem; border:none; background:none; color:#94a3b8; cursor:pointer; display:none;" onclick="toggleOffice()">[ TOGGLE OFFICE VIEW ]</button>

        <div id="results" class="results-area">
            <div id="deal-verdict" style="text-align:center; font-weight:bold; margin-bottom:10px;"></div>
            <button id="sync-btn" class="sync-btn" onclick="syncToZapier()">Push to Master Chart</button>

            <div id="office-view" class="office-view">
                <span class="section-label">1. Gross Fee</span><div id="off-gross">$0</div>
                <span class="section-label">2. Partner Share (22.5%)</span><div id="off-partner">$0</div>
                <span class="section-label">3. Seller Bonus</span><div id="off-surplus">$0</div>
            </div>
        </div>
    </div>
</div>

<script>
    const ZAPIER_URL = "https://hooks.zapier.com/hooks/catch/27133148/ujl6lys/";
    let currentUser = "";

    function unlock() {
        currentUser = document.getElementById('user_identity').value;
        if(!currentUser) return alert("Identify yourself.");
        document.getElementById('gatekeeper').style.display = 'none';
        document.getElementById('main_app').style.display = 'block';
        if(currentUser === "Admin") document.getElementById('admin-toggle').style.display = 'block';
    }

    function formatCurrency(input) { let n = input.value.replace(/\D/g, ""); input.value = n === "" ? "" : Number(n).toLocaleString(); }
    function parseVal(id) { return parseFloat(document.getElementById(id).value.replace(/,/g, "")) || 0; }
    function toggleOffice() { var x = document.getElementById('office-view'); x.style.display = (x.style.display === 'block') ? 'none' : 'block'; }

    function runAssessment() {
        const arv = parseVal('arv');
        const debt = parseVal('mortgage') + parseVal('arrears');
        const repairs = parseVal('roof'); // Simplified for example
        const grossFee = (arv * 0.70) - repairs - debt - 2000;
        
        document.getElementById('results').style.display = "block";
        document.getElementById('off-gross').innerText = "$" + Math.round(grossFee).toLocaleString();
        document.getElementById('off-partner').innerText = "$" + Math.round(grossFee * 0.225).toLocaleString();
        
        const verdict = document.getElementById('deal-verdict');
        if(grossFee < 10000) { verdict.innerText = "DENIED"; verdict.style.color = "red"; }
        else { verdict.innerText = "APPROVED"; verdict.style.color = "green"; }
    }

    async function syncToZapier() {
        const data = {
            partner: currentUser,
            address: document.getElementById('address').value,
            gross_fee: document.getElementById('off-gross').innerText
        };
        try {
            await fetch(ZAPIER_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            alert("✅ Synced!");
            location.reload();
        } catch (e) { alert("⚠️ Sync failed."); }
    }
</script>
</body>
</html>
