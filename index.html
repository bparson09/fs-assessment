<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Start | Assessment Machine</title>
    <style>
        :root { --brand: #2c3e50; --gold: #f39c12; --green: #27ae60; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #gatekeeper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .login-box { text-align: center; padding: 40px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); width: 320px; }
        .logo { font-size: 28px; font-weight: 900; color: var(--brand); letter-spacing: -1px; margin-bottom: 10px; }
        select, input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 16px; }
        .btn-entry { background: var(--brand); color: white; margin-top: 15px; }
        #machine_ui { display: none; width: 90%; max-width: 400px; background: white; padding: 35px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .result { margin-top: 25px; padding: 25px; border-radius: 15px; text-align: center; color: white; font-weight: 800; font-size: 22px; display: none; }
        .label { font-size: 12px; font-weight: 700; color: #999; text-transform: uppercase; margin-top: 15px; display: block; }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <div class="login-box">
            <div class="logo">FRESH START</div>
            <p style="color: #666; font-size: 14px; margin-bottom: 25px;">Assessment Machine v3.0</p>
            <select id="user_identity">
                <option value="">Choose Partner...</option>
                <option value="Rosie">Rosie</option>
                <option value="Admin">Admin</option>
            </select>
            <button class="btn-entry" onclick="unlock()">Enter Portal</button>
        </div>
    </div>

    <div id="machine_ui">
        <p style="font-size: 11px; text-transform: uppercase; color: #999; text-align: center; margin-bottom: 20px;">
            Active Session: <span id="display_name" style="color: var(--brand); font-weight: bold;"></span>
        </p>
        
        <span class="label">Property Address</span>
        <input type="text" id="addr" placeholder="Street, City, State">
        
        <span class="label">After Repair Value (ARV)</span>
        <input type="number" id="arv_val" placeholder="$0.00">
        
        <span class="label">Estimated Repairs</span>
        <input type="number" id="rep_val" placeholder="$0.00">
        
        <span class="label">Mortgage Payoff + Arrears</span>
        <input type="number" id="debt_val" placeholder="$0.00">

        <button onclick="runLogic()" style="background: var(--brand); color: white; margin-top: 25px;">Run Assessment</button>
        
        <div id="status_pill" class="result"></div>
        
        <button id="sync_btn" onclick="syncToZapier()" style="display:none; background: #eee; color: #333; margin-top: 15px;">Push to Master Chart</button>
    </div>

    <script>
        // PASTE YOUR ZAPIER LINK HERE
        const ZAPIER_URL = "https://hooks.zapier.com/hooks/catch/27133148/ujl6lys/";
        let partner = "";

        function unlock() {
            const user = document.getElementById('user_identity').value;
            if(!user) return alert("Identify yourself.");
            partner = user;
            document.getElementById('display_name').innerText = user;
            document.getElementById('gatekeeper').style.display = 'none';
            document.getElementById('machine_ui').style.display = 'block';
        }

        function runLogic() {
            const arv = parseFloat(document.getElementById('arv_val').value) || 0;
            const repairs = parseFloat(document.getElementById('rep_val').value) || 0;
            const debt = parseFloat(document.getElementById('debt_val').value) || 0;

            const bidRef = (arv * 0.7) - repairs - debt;
            const pill = document.getElementById('status_pill');
            const sync = document.getElementById('sync_btn');

            pill.style.display = "block";
            sync.style.display = "block";

            if(bidRef > 0) {
                pill.innerText = "APPROVED";
                pill.style.background = "#27ae60";
            } else {
                pill.innerText = "SEND FOR REVIEW";
                pill.style.background = "#f39c12";
            }
        }

        async function syncToZapier() {
            const btn = document.getElementById('sync_btn');
            btn.innerText = "TRANSMITTING...";
            btn.disabled = true;

            const payload = {
                partner: partner,
                address: document.getElementById('addr').value,
                arv: document.getElementById('arv_val').value,
                repairs: document.getElementById('rep_val').value,
                debt: document.getElementById('debt_val').value,
                intake_date: new Date().toLocaleDateString() // Wakes up your spreadsheet Column G
            };

            try {
                const res = await fetch(ZAPIER_URL, { method: 'POST', body: JSON.stringify(payload) });
                if(res.ok) {
                    alert("Deal Locked. Master Chart updated.");
                    location.reload();
                }
            } catch (e) {
                alert("Sync Error. Check your connection.");
                btn.disabled = false;
                btn.innerText = "Push to Master Chart";
            }
        }
    </script>
</body>
</html>
