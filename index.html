<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Machine | Fresh Start</title>
    <style>
        :root { --main-teal: #3eb1a5; --action-red: #c0392b; --action-orange: #e67e22; --bg-gray: #f4f7f6; --safe-green: #27ae60; --grey-review: #94a3b8; }
        input, select, textarea { font-size: 16px !important; touch-action: manipulation; }
        body { font-family: sans-serif; background-color: var(--bg-gray); margin: 0; padding: 10px; display: flex; justify-content: center; }
        
        /* Modal Style for Digital/In-Person Choice */
        #signing-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:10000; justify-content:center; align-items:center; }
        .modal-box { background:white; padding:25px; border-radius:15px; width:90%; max-width:320px; text-align:center; }
        .modal-btn { width:100%; padding:15px; margin:10px 0; border-radius:10px; border:none; font-weight:bold; cursor:pointer; font-size:1rem; }

        #gatekeeper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .login-box { width: 100%; max-width: 350px; text-align: center; }
        .app-logo { width: 90%; max-width: 320px; height: auto; margin-bottom: 25px; }
        .login-input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; }
        .btn-login { width: 100%; padding: 15px; background: var(--main-teal); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        .app-container { display: none; width: 100%; max-width: 450px; background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 2px solid var(--main-teal); overflow: hidden; }
        .header { background: var(--main-teal); color: white; padding: 12px; text-align: center; }
        .header h1 { margin: 0; font-size: 0.9rem; text-transform: uppercase; }
        .header p { margin: 4px 0 0; font-size: 0.6rem; opacity: 0.9; }
        .content { padding: 12px; }
        .section-label { font-size: 0.7rem; font-weight: bold; color: var(--main-teal); text-transform: uppercase; margin: 18px 0 10px 0; display: block; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        .field-box { margin-bottom: 12px; }
        .field-label { font-size: 0.75rem; font-weight: bold; color: #4a5568; margin-bottom: 4px; display: block; }
        .input-full { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .financial-grid { display: flex; flex-direction: column; gap: 10px; }
        @media (min-width: 600px) { .financial-grid { flex-direction: row; } .financial-grid .field-box { flex: 1; } }
        .input-group { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        select { flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; background: white; }
        .camera-btn { background: #f1f5f9; border: 1px solid #cbd5e0; border-radius: 8px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; position: relative; }
        .photo-count { position: absolute; top: -5px; right: -5px; background: var(--main-teal); color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 10px; }
        .status-banner { padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 0.75rem; margin-bottom: 12px; display: none; }
        
        .btn-action-master { width: 100%; padding: 18px; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 1rem; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-run { background: var(--main-teal); margin-top: 20px; }
        .btn-addendum { background: var(--action-orange); display: none; margin-top: 10px; }
        .results-area { display: none; margin-top: 15px; }
        .summary-card { background: #f8fafc; padding: 15px; border-radius: 10px; border: 1px solid #edf2f7; }
        .summary-line { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 8px; }
        .office-view { display: none; background: #fffbeb; padding: 12px; border-radius: 10px; margin-top: 15px; border: 1px dashed #f59e0b; }
    </style>
</head>
<body>

<div id="signing-modal">
    <div class="modal-box">
        <h3>Choose Signing Method</h3>
        <button class="modal-btn" style="background:var(--main-teal); color:white;" onclick="executeSync('Digital')">DIGITAL (Email/SignNow)</button>
        <button class="modal-btn" style="background:var(--grey-review); color:white;" onclick="executeSync('In-Person')">IN-PERSON (Tablet/Hand)</button>
        <button class="modal-btn" style="background:none; color:red;" onclick="closeModal()">Cancel</button>
    </div>
</div>

<div id="gatekeeper">
    <div class="login-box">
        <img src="logo.png" onerror="this.src='logo.png.png'" alt="Fresh Start Solutions" class="app-logo">
        <select id="user_identity" class="login-input">
            <option value="">Select Partner...</option>
            <option value="Rosie Searcy">Rosie Searcy</option>
            <option value="Admin">Admin</option>
        </select>
        <button class="btn-login" onclick="unlockMachine()">ENTER PORTAL</button>
    </div>
</div>

<div id="main_app" class="app-container">
    <div class="header">
        <h1>PROPERTY ASSESSMENT</h1>
        <p>"You Move On Your Own Terms—And We Help You Get There"</p>
    </div>

    <div class="content">
        <div id="auction-status" class="status-banner"></div>

        <div class="field-box">
            <label class="field-label">Seller Name(s)</label>
            <input type="text" id="seller_name" class="input-full" placeholder="John & Jane Doe">
        </div>

        <div class="field-box">
            <label class="field-label">Property Address</label>
            <input type="text" id="address" class="input-full" placeholder="Street, City, State">
        </div>
        
        <div class="financial-grid">
            <div class="field-box">
                <label class="field-label">Auction Date</label>
                <input type="date" id="auction-date" class="input-full" onchange="updateAuctionStatus()">
            </div>
            <div class="field-box">
                <label class="field-label">Move Window</label>
                <select id="move-window" class="input-full">
                    <option value="3">3 Days</option>
                    <option value="5" selected>5 Days</option>
                    <option value="7">7 Days</option>
                </select>
            </div>
        </div>

        <span class="section-label">Financials</span>
        <div class="field-box"><label class="field-label">After Repair Value (ARV)</label><input type="text" id="arv" class="input-full currency" placeholder="$0.00" oninput="formatCurrency(this)"></div>
        
        <div class="financial-grid">
            <div class="field-box"><label class="field-label">Mortgage Payoff</label><input type="text" id="mortgage" class="input-full currency" placeholder="$0.00" oninput="formatCurrency(this)"></div>
            <div class="field-box"><label class="field-label">Total Arrears</label><input type="text" id="arrears" class="input-full currency" placeholder="$0.00" oninput="formatCurrency(this)"></div>
        </div>
        
        <div class="field-box"><label class="field-label">Relo Benefit</label><input type="text" id="relo" class="input-full currency" value="2,000" oninput="formatCurrency(this)"></div>

        <span class="section-label">Verification & Documents</span>
        <div class="input-group">
            <div class="field-label" style="flex-grow:1; margin-bottom:0;">Seller I.D. (Front/Back)</div>
            <button class="camera-btn" onclick="triggerCam('count-id')">📸<span id="count-id" class="photo-count">0</span></button>
        </div>

        <input type="file" id="cam" accept="image/*" capture="camera" style="display:none" onchange="fileSelected()">

        <button class="btn-action-master btn-run" onclick="runAssessment()">Run Assessment</button>
        <button id="toggle-office-btn" style="width:100%; margin-top:10px; font-size:0.6rem; border:none; background:none; color:#94a3b8; cursor:pointer; display:none;" onclick="toggleOffice()">[ TOGGLE OFFICE VIEW ]</button>

        <div id="results" class="results-area">
            <div id="deal-verdict" style="text-align:center; font-weight:bold; margin-bottom:10px; font-size: 1.1rem;"></div>
            
            <div id="office-view" class="office-view">
                <span class="field-label" style="color:#92400e; text-transform: uppercase;">Firm True Net</span>
                <div id="off-gross-display" style="font-size:1.1rem; font-weight:bold; color:#1e293b; margin-bottom:10px;">$0</div>

                <div class="field-box">
                    <label class="field-label" style="color:#92400e;">Power Hour Final Bid ($)</label>
                    <input type="text" id="final_bid" class="input-full currency" placeholder="Enter Final Bid..." oninput="formatCurrency(this); checkAddendumButton();">
                </div>

                <button id="btn-addendum" class="btn-action-master btn-addendum" onclick="prepareSync('ADDENDUM')">GENERATE PURCHASE PRICE ADDENDUM</button>
            </div>

            <div class="summary-card">
                <div class="summary-line"><span>Total Debt Cleared:</span> <span id="res-debt">$0</span></div>
                <div class="summary-line"><span>Relo + Bonus:</span> <span id="res-relo">$0</span></div>
                <div class="summary-line" style="border-top:1px solid #ccc; padding-top:10px; font-weight:bold; color:var(--main-teal); font-size:1rem;">
                    <span>TOTAL SELLER NET:</span> <span id="res-total">$0</span>
                </div>
            </div>
            <button id="sync-btn" class="btn-action-master" style="background:var(--action-red);" onclick="prepareSync('PACKET_A')">GENERATE PACKET A</button>
        </div>
    </div>
</div>

<script>
    let activeCounterId = null;
    let leadColor = "Standard";
    let currentUser = "";
    let globalVerdict = "";
    let currentSyncMode = ""; // Either 'PACKET_A' or 'ADDENDUM'

    function unlockMachine() {
        currentUser = document.getElementById('user_identity').value;
        if(!currentUser) return alert("Please select a partner.");
        document.getElementById('gatekeeper').style.display = 'none';
        document.getElementById('main_app').style.display = 'block';
        if(currentUser === "Admin") document.getElementById('toggle-office-btn').style.display = 'block';
    }

    function formatCurrency(input) { let n = input.value.replace(/\D/g, ""); input.value = n === "" ? "" : Number(n).toLocaleString(); }
    function parseVal(id) { return parseFloat(document.getElementById(id).value.replace(/,/g, "")) || 0; }
    
    function updateAuctionStatus() {
        const val = document.getElementById('auction-date').value;
        const banner = document.getElementById('auction-status');
        if(!val) return;
        const diff = Math.ceil((new Date(val) - new Date()) / (1000 * 60 * 60 * 24));
        banner.style.display = "block";
        if(diff < 15) { leadColor = "RED"; banner.style.backgroundColor = "#fee2e2"; banner.style.color = "#b91c1c"; banner.innerText = "🔴 RED LEAD (Auction < 15 Days)"; } 
        else { leadColor = "GREEN"; banner.style.backgroundColor = "#dcfce7"; banner.style.color = "#15803d"; banner.innerText = "🟢 GREEN LEAD (Safe Timeline)"; }
    }

    function triggerCam(counterId) { activeCounterId = counterId; document.getElementById('cam').click(); }
    function fileSelected() {
        const fileInput = document.getElementById('cam');
        if (fileInput.files.length > 0 && activeCounterId) {
            let el = document.getElementById(activeCounterId);
            el.innerText = parseInt(el.innerText) + 1;
            fileInput.value = ""; 
        }
    }

    function toggleOffice() { var x = document.getElementById('office-view'); x.style.display = (x.style.display === 'block') ? 'none' : 'block'; }

    function checkAddendumButton() {
        const bid = parseVal('final_bid');
        document.getElementById('btn-addendum').style.display = (bid > 0) ? "block" : "none";
    }

    function runAssessment() {
        const arv = parseVal('arv');
        const debt = parseVal('mortgage') + parseVal('arrears');
        const reloBase = parseVal('relo');
        
        // Logical profit capture (70/30 split logic as requested previously)
        const finalPrice = (arv * 0.70);
        const grossFee = finalPrice - debt - reloBase;
        let bonus = (grossFee > 10000) ? (grossFee - 10000) * 0.30 : 0;
        if(bonus > 15000) bonus = 15000;

        document.getElementById('results').style.display = "block";
        document.getElementById('res-debt').innerText = "$" + debt.toLocaleString();
        document.getElementById('res-relo').innerText = "$" + (reloBase + bonus).toLocaleString();
        document.getElementById('res-total').innerText = "$" + (debt + reloBase + bonus).toLocaleString();
        document.getElementById('off-gross-display').innerText = "$" + Math.round(grossFee).toLocaleString();

        const verdictEl = document.getElementById('deal-verdict');
        if(grossFee < 10000) {
            globalVerdict = "DENIED";
            verdictEl.innerText = "REVIEW REQUIRED";
            verdictEl.style.color = "#64748b";
        } else {
            globalVerdict = "APPROVED";
            verdictEl.innerText = "ELIGIBLE FOR FRESH START";
            verdictEl.style.color = "green";
        }
    }

    function prepareSync(mode) {
        currentSyncMode = mode;
        document.getElementById('signing-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('signing-modal').style.display = 'none'; }

    async function executeSync(method) {
        closeModal();
        const data = {
            partner: currentUser,
            seller_name: document.getElementById('seller_name').value,
            address: document.getElementById('address').value,
            document_type: currentSyncMode, // Packet A or Addendum
            signing_method: method, // Digital or In-Person
            final_bid_price: document.getElementById('final_bid').value,
            total_seller_net: document.getElementById('res-total').innerText,
            lead_color: leadColor,
            timestamp: new Date().toLocaleString()
        };
        
        try {
            await fetch('https://hooks.zapier.com/hooks/catch/27133148/ujl6lys/', { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            alert("✅ " + currentSyncMode + " Synced via " + method);
            if(currentSyncMode === "PACKET_A") location.reload();
        } catch (e) { alert("⚠️ Sync failed."); }
    }
</script>
</body>
</html>
